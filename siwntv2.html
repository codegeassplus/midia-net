<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beIN Ultra - سيرفر سيئون</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<style>
:root{
    --bg:#050816;
    --card:#111827;
    --primary:#00d2ff;
    --secondary:#7c3aed;
    --text:#fff;
    --border:rgba(255,255,255,.1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cairo',sans-serif;
    background:radial-gradient(circle at top left,#13203f 0%,#050816 40%);
    color:var(--text);
    padding:20px;
    overflow-x:hidden;
}

.container{
    width:min(1400px,100%);
    margin:auto;
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

.header-top{
    text-align:center;
}

.header-top h1{
    font-size:1.8rem;
    font-weight:900;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#liveLabel{
    color:var(--primary);
    font-weight:bold;
    margin-top:8px;
}

.player-wrapper{
    position:relative;
    overflow:hidden;
    border-radius:15px;
    background:#000;
    border:1px solid var(--border);
    box-shadow:0 15px 50px rgba(0,0,0,.6);
}

#videoPlayer{
    width:100%;
    aspect-ratio:16/9;
    min-height:220px;
}

.channels-list-wrapper{
    width:100%;
}

.channels-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.channel-item{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px;
    min-height:52px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    transition:.2s;
    touch-action:manipulation;
}

.channel-item:hover,
.channel-item.active{
    border-color:var(--primary);
    background:rgba(0,210,255,.1);
}

.ch-id{
    width:32px;
    height:32px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    font-size:.85rem;
    font-weight:900;
    flex-shrink:0;
}

.ch-name{
    font-size:.9rem;
    font-weight:700;
}

.loader{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.spinner{
    width:42px;
    height:42px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.1);
    border-top-color:var(--primary);
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

/* الهواتف */

@media (max-width:768px){

    body{
        padding:12px;
    }

    .header-top h1{
        font-size:1.4rem;
    }

    .channels-grid{
        grid-template-columns:1fr;
    }

    #videoPlayer{
        min-height:200px;
    }
}

/* التابلت */

@media (min-width:769px) and (max-width:1024px){

    .channels-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

/* الشاشات الكبيرة */

@media (min-width:1025px){

    .container{
        grid-template-columns:2fr 1fr;
        align-items:start;
    }

    .header-top{
        grid-column:1 / -1;
    }

    .channels-grid{
        grid-template-columns:1fr;
    }

    .channels-list-wrapper{
        max-height:80vh;
        overflow-y:auto;
        padding-left:5px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header-top">
        <h1>سيرفر سيئون</h1>
        <p id="liveLabel">beIN Sports 1</p>
    </div>

    <div class="player-wrapper">

        <div class="loader" id="loader">
            <div class="spinner"></div>
        </div>

        <video
            id="videoPlayer"
            class="video-js vjs-big-play-centered"
            controls
            preload="auto">
        </video>

    </div>

    <div class="channels-list-wrapper">
        <div class="channels-grid" id="channelsList"></div>
    </div>

</div>

<script>
const channels = [
    { id: 1, name: 'beIN Sports 1' },
    { id: 2, name: 'beIN Sports 2' },
    { id: 3, name: 'beIN Sports 3' },
    { id: 4, name: 'beIN Sports 4' }
];

let currentId = 1;

const player = videojs('videoPlayer', {
    autoplay: true,
    fluid: true,
    responsive: true,
    liveui: true
});

function renderChannels() {

    const grid = document.getElementById('channelsList');

    grid.innerHTML = '';

    channels.forEach(channel => {

        const item = document.createElement('div');

        item.className =
            `channel-item ${currentId === channel.id ? 'active' : ''}`;

        item.innerHTML = `
            <div class="ch-id">${channel.id}</div>
            <div class="ch-name">${channel.name}</div>
        `;

        item.addEventListener('click', () => {
            loadStream(channel.id);
        });

        grid.appendChild(item);
    });
}

function loadStream(id) {

    currentId = id;

    renderChannels();

    const loader = document.getElementById('loader');
    loader.style.display = 'flex';

    const channel = channels.find(ch => ch.id === id);

    document.getElementById('liveLabel').textContent = channel.name;

    const streamUrl =
        `https://kora.fiberlive.live/playlist.php?id=${id}&type=master&server=3`;

    player.src({
        src: streamUrl,
        type: 'application/x-mpegURL'
    });

    player.play().catch(() => {});

    setTimeout(() => {
        loader.style.display = 'none';
    }, 1200);
}

player.on('waiting', () => {
    document.getElementById('loader').style.display = 'flex';
});

player.on('playing', () => {
    document.getElementById('loader').style.display = 'none';
});

renderChannels();
loadStream(1);
</script>

</body>
</html>
